<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#536dfe">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="description" content="Lista partilhada de compras e tarefas para Ricardo & Carol.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ricardo & Carol">
  <link rel="manifest" href="manifest.json?v=12">
  <link rel="icon" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css?v=12">
  <title>Ricardo & Carol</title>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Navegação principal">
      <div class="brand">
        <img src="assets/icon-192.png" alt="">
        <div>
          <strong>Ricardo & Carol</strong>
          <span>Casa partilhada</span>
        </div>
      </div>

      <nav class="nav-list" id="desktopNav"></nav>

      <div class="connection-card">
        <div id="syncState"><span class="status-dot waiting"></span>A ligar...</div>
        <div id="userState">Sessão anónima</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Ricardo & Carol</p>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSub">Resumo das compras, tarefas e atividade.</p>
        </div>
        <div class="top-actions">
          <button class="button secondary" type="button" data-action="sync">Sincronizar</button>
          <button class="button primary" type="button" data-action="quick-add">Adicionar</button>
        </div>
      </header>

      <section class="page active" id="dashboard" aria-labelledby="pageTitle"></section>
      <section class="page" id="compras" aria-labelledby="pageTitle"></section>
      <section class="page" id="tarefas" aria-labelledby="pageTitle"></section>
      <section class="page" id="notificacoes" aria-labelledby="pageTitle"></section>
      <section class="page" id="configuracoes" aria-labelledby="pageTitle"></section>
    </main>
  </div>

  <nav class="mobile-nav" id="mobileNav" aria-label="Navegação principal"></nav>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="update-screen" id="updateScreen" aria-hidden="true" role="status" aria-live="polite">
    <div class="update-card">
      <img src="assets/icon-192.png" alt="">
      <div class="update-spinner" aria-hidden="true"></div>
      <h2 id="updateTitle">A atualizar a app</h2>
      <p id="updateMessage">Estamos a instalar a nova versão. Mantém a app aberta só uns segundos.</p>
    </div>
  </div>

  <script type="module" src="app.js?v=12"></script>
</body>
</html>
